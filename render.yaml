services:
  - type: web
    name: kellystudio-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app
    autoDeploy: true
    envVars:
      - key: PAYMENT_PROVIDER
        value: mercado_pago
      - key: SITE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: ORDER_STATUS_WEBHOOK_URL
        sync: false
      - key: PORT
        value: "10000"
